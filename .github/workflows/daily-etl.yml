name: Daily ETL

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. These two schedules cover 8 AM America/Chicago
    # during daylight time and standard time; the guard step below skips the
    # non-matching one.
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"

concurrency:
  group: daily-etl
  cancel-in-progress: false

jobs:
  etl:
    name: Run daily ETL
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      TZ: America/Chicago
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ETL_ALERT_EMAIL_FROM: ${{ secrets.ETL_ALERT_EMAIL_FROM }}
      ETL_ALERT_EMAIL_TO: ${{ secrets.ETL_ALERT_EMAIL_TO }}
      ETL_ALERT_EMAIL_ON_SUCCESS: ${{ secrets.ETL_ALERT_EMAIL_ON_SUCCESS }}

    steps:
      - name: Check schedule hour
        id: schedule_guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run_etl=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          local_hour="$(TZ=America/Chicago date +%H)"
          if [ "$local_hour" = "08" ]; then
            echo "run_etl=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping because America/Chicago hour is $local_hour, not 08."
            echo "run_etl=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.schedule_guard.outputs.run_etl == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.schedule_guard.outputs.run_etl == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: steps.schedule_guard.outputs.run_etl == 'true'
        run: npm ci

      - name: Run daily ETL
        if: steps.schedule_guard.outputs.run_etl == 'true'
        run: npm run etl:daily

      - name: Upload ETL logs
        if: always() && steps.schedule_guard.outputs.run_etl == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: etl-logs-${{ github.run_id }}
          path: logs/etl/*.log
          if-no-files-found: ignore
          retention-days: 14
